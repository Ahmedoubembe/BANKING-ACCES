# ============= CONFIGURATION JPA/HIBERNATE =============
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============= CONFIGURATION DU SERVEUR =============
server.port=8077
server.servlet.context-path=/banking_access

# Repertoire de stockage des justificatifs
app.upload.dir=C:/Users/DOP/Documents/TestUpload
# Taille maximale des fichiers (ajuster selon besoin)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB






# ============= CONFIGURATION DE POOL DE CONNEXIONS =============
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000



# ============= CONFIGURATION GENERALE =============
spring.application.name=banking_access
spring.main.allow-bean-definition-overriding=true







# ============= NIVEAUX DE LOG =============
logging.level.com.bamis.banking_access=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE